import {
  computeFractalMetrics,
  fractalDimensionBoxCount,
  selfSimilarityIndex,
  boundaryRoughness
} from "./fractalMathEngine.js";

function renderFractalCorrelationLines() {
  const { entities, matrix } = computeFractalCorrelationMatrix(nodes, links);

  const threshold = 0.75; // adjustable

  const lines = [];

  for (let i = 0; i < entities.length; i++) {
    for (let j = i + 1; j < entities.length; j++) {
      const corr = matrix[i][j];
      if (corr >= threshold) {
        const a = entities[i];
        const b = entities[j];
        if (a.x && b.x) {
          lines.push({ a, b, corr });
        }
      }
    }
  }

  function assignFractalClusters(nodes, links, threshold = 0.75) {
  const { entities, clusters } = computeFractalCorrelationClusters(nodes, links, threshold);

  clusters.forEach((cluster, idx) => {
    cluster.forEach(i => {
      const node = entities[i];
      node.fractalClusterId = idx;
    });
  });
  }

  function computeFractalCorrelationClusters(nodes, links, threshold = 0.75) {
  const entities = nodes; // cluster nodes only (you can extend to edges if desired)
  const vectors = entities.map(e => fractalVector(e));

  const n = entities.length;
  const adj: number[][] = Array.from({ length: n }, () => []);

  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const corr = correlation(vectors[i], vectors[j]);
      if (corr >= threshold) {
        adj[i].push(j);
        adj[j].push(i);
      }
    }
  }

  const visited = new Array(n).fill(false);
  const clusters: number[][] = [];

  for (let i = 0; i < n; i++) {
    if (visited[i]) continue;
    const stack = [i];
    const cluster: number[] = [];
    visited[i] = true;

    while (stack.length) {
      const v = stack.pop()!;
      cluster.push(v);
      for (const nb of adj[v]) {
        if (!visited[nb]) {
          visited[nb] = true;
          stack.push(nb);
        }
      }
    }

    clusters.push(cluster);
  }

  return { entities, clusters };
  }

  function renderCorrelationHalos() {
  const { entities, matrix } = computeFractalCorrelationMatrix(nodes, links);

  const halos = nodes.map((node, i) => {
    const correlations = matrix[i];
    const avgCorr = correlations.reduce((a, b) => a + b, 0) / correlations.length;
    return { node, avgCorr };
  });

  const sel = svg.selectAll(".correlation-halo")
    .data(halos, d => d.node.id);

  sel.enter()
    .append("circle")
    .attr("class", "correlation-halo")
    .attr("r", d => 18 + d.avgCorr * 20)
    .attr("fill", "none")
    .attr("stroke", d => `rgba(147,51,234,${d.avgCorr * 0.3})`)
    .attr("stroke-width", 1.5)
    .attr("cx", d => d.node.x)
    .attr("cy", d => d.node.y);

  sel
    .attr("r", d => 18 + d.avgCorr * 20)
    .attr("stroke", d => `rgba(147,51,234,${d.avgCorr * 0.3})`)
    .attr("cx", d => d.node.x)
    .attr("cy", d => d.node.y);

  sel.exit().remove();
  }

  const sel = correlationLayer.selectAll("line")
    .data(lines, d => `${d.a.id}-${d.b.id}`);

  sel.enter()
    .append("line")
    .attr("stroke", d => `rgba(56,189,248,${d.corr * 0.4})`)
    .attr("stroke-width", d => 1 + d.corr * 2)
    .attr("x1", d => d.a.x)
    .attr("y1", d => d.a.y)
    .attr("x2", d => d.b.x)
    .attr("y2", d => d.b.y);

  sel
    .attr("stroke", d => `rgba(56,189,248,${d.corr * 0.4})`)
    .attr("stroke-width", d => 1 + d.corr * 2)
    .attr("x1", d => d.a.x)
    .attr("y1", d => d.a.y)
    .attr("x2", d => d.b.x)
    .attr("y2", d => d.b.y);

  sel.exit().remove();
}

const clusterPalette = [
  "#22c55e",
  "#3b82f6",
  "#f97316",
  "#e11d48",
  "#a855f7",
  "#14b8a6",
  "#facc15"
];

function clusterColor(clusterId: number | undefined) {
  if (clusterId == null) return "#9ca3af";
  return clusterPalette[clusterId % clusterPalette.length];
}

// Attach fractal metrics placeholder to each node
nodes.forEach(n => {
  n.fractal = {
    fractalDimension: null,
    selfSimilarityIndex: null,
    boundaryRoughness: null,
    fractalInstabilityIndex: null
  };
});

  function fractalNoise(x, y, scale = 0.005) {
  return (
    Math.sin((x * scale) + Math.cos(y * scale * 0.7)) *
    Math.cos((y * scale) + Math.sin(x * scale * 0.4))
  );
  }

  function computeGlobalFractalField(nodes, links) {
  const values = [];

  nodes.forEach(n => {
    if (n.fractal?.fractalInstabilityIndex != null) {
      values.push(n.fractal.fractalInstabilityIndex);
    }
  });

  links.forEach(l => {
    if (l.fractal?.fractalInstabilityIndex != null) {
      values.push(l.fractal.fractalInstabilityIndex);
    }
  });

  if (values.length === 0) return { min: 0, max: 1 };

  return {
    min: Math.min(...values),
    max: Math.max(...values)
  };
  }

  function computeFractalCorrelationMatrix(nodes, links) {
  const entities = [...nodes, ...links];
  const vectors = entities.map(e => fractalVector(e));

  const matrix = [];

  for (let i = 0; i < entities.length; i++) {
    const row = [];
    for (let j = 0; j < entities.length; j++) {
      row.push(correlation(vectors[i], vectors[j]));
    }
    matrix.push(row);
  }

  return { entities, matrix };
  }

  function correlation(a: number[], b: number[]): number {
  const n = a.length;
  const meanA = a.reduce((x, y) => x + y, 0) / n;
  const meanB = b.reduce((x, y) => x + y, 0) / n;

  let num = 0;
  let denA = 0;
  let denB = 0;

  for (let i = 0; i < n; i++) {
    const da = a[i] - meanA;
    const db = b[i] - meanB;
    num += da * db;
    denA += da * da;
    denB += db * db;
  }

  const den = Math.sqrt(denA * denB);
  return den === 0 ? 0 : num / den;
  }

  function computeNodeStructuralInputs(node, nodes, links) {
  const subcomponents = nodes.filter(n => n.parentId === node.id).length;

  const outgoing = links.filter(l => l.source.id === node.id).length;
  const incoming = links.filter(l => l.target.id === node.id).length;

  const degree = outgoing + incoming;

  const children = nodes.filter(n => n.parentId === node.id);
  const childDegrees = children.map(c =>
    links.filter(l => l.source.id === c.id || l.target.id === c.id).length
  );

  const avgChildDegree =
    childDegrees.length > 0
      ? childDegrees.reduce((a, b) => a + b, 0) / childDegrees.length
      : 0;

  return {
    subcomponents,
    degree,
    avgChildDegree
  };
  }

  function renderFractalHeatmap() {
  const { min, max } = computeGlobalFractalField(nodes, links);

  const cellSize = 40; // adjustable resolution
  const cols = Math.ceil(width / cellSize);
  const rows = Math.ceil(height / cellSize);

  const data = [];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * cellSize;
      const y = r * cellSize;

      const noise = fractalNoise(x, y);
      const mapped = min + (max - min) * ((noise + 1) / 2);

      data.push({ x, y, value: mapped });
    }
  }

  const cells = heatmapLayer.selectAll("rect")
    .data(data, d => `${d.x}-${d.y}`);

  cells.enter()
    .append("rect")
    .attr("x", d => d.x)
    .attr("y", d => d.y)
    .attr("width", cellSize)
    .attr("height", cellSize)
    .attr("fill", d => heatmapColor(d.value, min, max))
    .attr("stroke", "none");

  cells
    .attr("fill", d => heatmapColor(d.value, min, max));

  cells.exit().remove();
  }

  function edgeColor(fii) {
  if (fii === null) return "#4b5563";
  if (fii < 0.4) return "#22c55e";   // stable
  if (fii < 0.8) return "#facc15";   // semi-stable
  return "#ef4444";                  // unstable
}

function computeEdgeStructuralInputs(edge, nodes, links) {
  const source = edge.source;
  const target = edge.target;

  const sourceChildren = nodes.filter(n => n.parentId === source.id).length;
  const targetChildren = nodes.filter(n => n.parentId === target.id).length;

  const sourceDegree = links.filter(l => l.source.id === source.id || l.target.id === source.id).length;
  const targetDegree = links.filter(l => l.source.id === target.id || l.target.id === target.id).length;

  const tension = Math.abs(sourceDegree - targetDegree);
  const hierarchyGap = Math.abs(sourceChildren - targetChildren);

  return {
    tension,
    hierarchyGap,
    sourceDegree,
    targetDegree
  };
}

function generateFractalInputsForEdge(edge, nodes, links) {
  const s = computeEdgeStructuralInputs(edge, nodes, links);

  const scales = [1.0, 0.5, 0.25, 0.125];

  const counts = scales.map(scale =>
    Math.max(1, Math.floor((s.tension + s.hierarchyGap + 1) * (1 / scale)))
  );

  const patterns = scales.map((scale, i) => ({
    scale,
    features: [
      s.tension * scale,
      s.hierarchyGap * (1 - scale),
      (s.sourceDegree + s.targetDegree) * 0.05 * (i + 1)
    ]
  }));

  const boundaryLengths = [
    s.tension + 1,
    s.tension + 1.3,
    s.tension + 1.9,
    s.tension + 2.4
  ];

  return { scales, counts, patterns, boundaryLengths };
}

function heatmapColor(value, min, max) {
  const t = (value - min) / (max - min + 1e-9);

  if (t < 0.33) return "rgba(34,197,94,0.18)";   // green glow
  if (t < 0.66) return "rgba(250,204,21,0.22)";  // yellow glow
  return "rgba(239,68,68,0.25)";                 // red glow
}

function edgeWidth(dimension) {
  if (dimension === null) return 1.2;
  return 1.2 + dimension * 1.5;
}

function edgeDash(ssi) {
  if (ssi === null) return "0,0";
  if (ssi > 0.8) return "1,0";       // solid
  if (ssi > 0.4) return "4,2";       // medium
  return "2,4";                      // highly recursive
}

function edgeGlow(roughness) {
  if (roughness === null) return 0.0;
  return Math.min(0.6, roughness * 0.4);
}

assignFractalClusters(nodes, links, 0.75);

simulation.on("tick", () => {
  renderFractalCorrelationLines();
  renderCorrelationHalos();
});
  
  // --- Parse CSV into rows ---
  function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    const header = lines[0].split(",");
    return lines.slice(1).map(line => {
      const cols = [];
      let current = "";
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"' && line[i + 1] === '"') {
          current += '"';
          i++;
        } else if (c === '"') {
          inQuotes = !inQuotes;
        } else if (c === "," && !inQuotes) {
          cols.push(current);
          current = "";
        } else {
          current += c;
        }
      }
      cols.push(current);
      const obj = {};
      header.forEach((h, idx) => obj[h.trim()] = (cols[idx] || "").trim());
      return obj;
    });
  }

  const rows = parseCSV(csvData);

  // --- Build nodes and edges ---
  const nodeMap = new Map();
  const nodes = [];
  const links = [];

  function ensureNode(id, label, type, parentId = null) {
    if (!nodeMap.has(id)) {
      const node = {
        id,
        label,
        type,       // "main" or "sub"
        parentId,
      };
      nodeMap.set(id, node);
      nodes.push(node);
    }
    return nodeMap.get(id);
  }

  nodes.forEach(node => {
  const { scales, counts, patterns, boundaryLengths } =
    generateFractalInputsForNode(node);

  const metrics = computeFractalMetrics(
    scales,
    counts,
    patterns,
    boundaryLengths,
    1.0, // alpha
    1.0, // beta
    1.0  // gamma
  );

  node.fractal = metrics;
});
  
  rows.forEach(row => {
    const mainId = row.NodeID;
    const mainName = row.NodeName;
    const subId = row.SubComponentID;
    const subName = row.SubComponentName;

    const mainNode = ensureNode(mainId, mainName, "main", null);
    const subNode = ensureNode(subId, subName, "sub", mainId);

    links.push({
      source: mainNode.id,
      target: subNode.id,
      kind: "contains"
    });
  });

  links.forEach(edge => {
  const { scales, counts, patterns, boundaryLengths } =
    generateFractalInputsForEdge(edge);

  const metrics = computeFractalMetrics(
    scales,
    counts,
    patterns,
    boundaryLengths,
    1.0,
    1.0,
    1.0
  );

  edge.fractal = metrics;
});

  link
  .attr("stroke", d => edgeColor(d.fractal.fractalInstabilityIndex))
  .attr("stroke-width", d => edgeWidth(d.fractal.fractalDimension))
  .attr("stroke-dasharray", d => edgeDash(d.fractal.selfSimilarityIndex))
  .style("filter", d =>
    edgeGlow(d.fractal.boundaryRoughness)
      ? `drop-shadow(0 0 ${8 * edgeGlow(d.fractal.boundaryRoughness)}px rgba(56,189,248,${edgeGlow(d.fractal.boundaryRoughness)}))`
      : "none"
  );

  // --- Impose a coarse DAG ordering between main nodes (pipeline order) ---
  const mainOrder = [
    "ING-01",
    "ING-02",
    "MAP-01",
    "MAP-02",
    "MAP-03",
    "STR-01",
    "SIG-01",
    "CAS-01",
    "RES-01",
    "META-01",
    "OUT-01"
  ];
  for (let i = 0; i < mainOrder.length - 1; i++) {
    const from = mainOrder[i];
    const to = mainOrder[i + 1];
    if (nodeMap.has(from) && nodeMap.has(to)) {
      links.push({
        source: from,
        target: to,
        kind: "flow"
      });
    }
  }

  function fractalVector(entity) {
  return [
    entity.fractal.fractalDimension ?? 0,
    entity.fractal.selfSimilarityIndex ?? 0,
    entity.fractal.boundaryRoughness ?? 0,
    entity.fractal.fractalInstabilityIndex ?? 0
  ];
  }

  function generateFractalInputsForEdge(edge) {
  const scales = [1.0, 0.5, 0.25, 0.125];
  const counts = scales.map(s => Math.floor(5 / s) + (edge.kind === "flow" ? 2 : 0));

  const patterns = scales.map((s, i) => ({
    scale: s,
    features: [
      Math.sin(i + 1 + edge.source.id.length) * 0.4 + 1,
      Math.cos(i + 2 + edge.target.id.length) * 0.3 + 1,
      (i + 1) * 0.08
    ]
  }));

  const boundaryLengths = [6, 7.1, 8.3, 9.0];

  return { scales, counts, patterns, boundaryLengths };
  }

  function generateFractalInputsForNode(node, nodes, links) {
  const s = computeNodeStructuralInputs(node, nodes, links);

  const scales = [1.0, 0.5, 0.25, 0.125];

  const counts = scales.map(scale =>
    Math.max(1, Math.floor((s.subcomponents + s.degree + 1) * (1 / scale)))
  );

  const patterns = scales.map((scale, i) => ({
    scale,
    features: [
      s.subcomponents * scale,
      s.degree * (1 - scale),
      s.avgChildDegree * (i + 1) * 0.1
    ]
  }));

  const boundaryLengths = [
    s.degree + 1,
    s.degree + 1.4,
    s.degree + 2.1,
    s.degree + 2.8
  ];

  return { scales, counts, patterns, boundaryLengths };
  }

  // --- Update meta counts ---
  document.getElementById("meta-nodes").textContent = nodes.length;
  document.getElementById("meta-edges").textContent = links.length;

  // --- D3 Force-Directed Graph ---
  const svg = d3.select("#graph");
  const width = window.innerWidth;
  const height = window.innerHeight - 40;

  svg.attr("viewBox", [0, 0, width, height]);

  // Arrow marker
  const defs = svg.append("defs");
  defs.append("marker")
    .attr("id", "arrow")
    .attr("viewBox", "0 -5 10 10")
    .attr("refX", 14)
    .attr("refY", 0)
    .attr("markerWidth", 5)
    .attr("markerHeight", 5)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-5L10,0L0,5")
    .attr("fill", "#4b5563")
    .attr("fill-opacity", 0.7);

  const blur = defs.append("filter")
  .attr("id", "fractal-blur")
  .append("feGaussianBlur")
  .attr("stdDeviation", 18);

  const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links)
      .id(d => d.id)
      .distance(d => d.kind === "flow" ? 120 : 60)
      .strength(d => d.kind === "flow" ? 0.4 : 0.9))
    .force("charge", d3.forceManyBody().strength(-260))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collision", d3.forceCollide().radius(d => d.type === "main" ? 22 : 14))
    .alphaDecay(0.02);

  heatmapLayer.attr("filter", "url(#fractal-blur)");

  const link = svg.append("g")
    .attr("stroke-linecap", "round")
    .selectAll("line")
    .data(links)
    .join("line")
    .attr("class", "link")
    .attr("stroke-dasharray", d => d.kind === "flow" ? "3,3" : "0,0")
    .attr("stroke-width", d => d.kind === "flow" ? 1.2 : 1.0);

  const node = svg.append("g")
    .selectAll("g")
    .data(nodes)
    .join("g")
    .attr("class", d => "node " + (d.type === "main" ? "node-main" : "node-sub"))
    .call(d3.drag()
      .on("start", dragstarted)
      .on("drag", dragged)
      .on("end", dragended));

  node.append("circle");

  node.append("text")
    .attr("x", 0)
    .attr("y", d => d.type === "main" ? -14 : -10)
    .attr("text-anchor", "middle")
    .text(d => d.label);

  simulation.on("tick", () => {
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);

    node.attr("transform", d => `translate(${d.x},${d.y})`);

    simulation.on("tick", () => {
  renderFractalHeatmap();
  // existing node/edge updates...
});
  });

  links.forEach(link => {
  link.fractal = {
    fractalDimension: null,
    selfSimilarityIndex: null,
    boundaryRoughness: null,
    fractalInstabilityIndex: null
  };
});
  
  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.2).restart();
    d.fx = d.x;
    d.fy = d.y;
  }

  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }

  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }
  
  function generateFractalInputsForNode(node) {
  // Example synthetic scale series
  const scales = [1.0, 0.5, 0.25, 0.125];
  const counts = scales.map(s => Math.floor(10 / s)); // simple box-counting proxy

  const patterns = scales.map((s, i) => ({
    scale: s,
    features: [
      Math.sin(i + 1) * 0.5 + 1,
      Math.cos(i + 2) * 0.3 + 1,
      (i + 1) * 0.1
    ]
  }));

  const boundaryLengths = [10, 11.2, 12.8, 14.1];

  return { scales, counts, patterns, boundaryLengths };
  }
  
  // --- Info panel wiring ---
  const infoPanel = document.getElementById("info-panel");

  function setInfo(nodeData) {
    infoPanel.innerHTML = "";
    const title = document.createElement("h2");
    title.textContent = "Node Details";
    infoPanel.appendChild(title);

    if (d.source && d.target) {
  const fractalHeader = document.createElement("div");
  fractalHeader.className = "label";
  fractalHeader.textContent = "Fractal Edge Metrics";
  infoPanel.appendChild(fractalHeader);

  function addEdgeMetric(label, value) {
    const row = document.createElement("div");
    row.className = "metric";
    row.innerHTML = `<span>${label}</span><span class="value">${
      value === null ? "—" : value.toFixed(4)
    }</span>`;
    infoPanel.appendChild(row);
  }

  addEdgeMetric("Fractal Dimension (Dᶠ)", d.fractal.fractalDimension);
  addEdgeMetric("Self-Similarity Index (SSI)", d.fractal.selfSimilarityIndex);
  addEdgeMetric("Boundary Roughness (Bᵣ)", d.fractal.boundaryRoughness);
  addEdgeMetric("Fractal Instability Index (FII)", d.fractal.fractalInstabilityIndex);
    }

    const badgeRow = document.createElement("div");
    const badge = document.createElement("span");
    badge.className = "badge " + (nodeData.type === "main" ? "main" : "sub");
    badge.textContent = nodeData.type === "main" ? "Main Engine Node" : "Sub‑Component";
    badgeRow.appendChild(badge);
    infoPanel.appendChild(badgeRow);

    const labelLabel = document.createElement("div");
    labelLabel.className = "label";
    labelLabel.textContent = "Label";
    infoPanel.appendChild(labelLabel);

    const labelValue = document.createElement("div");
    labelValue.className = "value";
    labelValue.textContent = nodeData.label;
    infoPanel.appendChild(labelValue);

    const idLabel = document.createElement("div");
    idLabel.className = "label";
    idLabel.textContent = "ID";
    infoPanel.appendChild(idLabel);

    const idValue = document.createElement("div");
    idValue.className = "value";
    idValue.textContent = nodeData.id;
    infoPanel.appendChild(idValue);

    if (nodeData.type === "sub" && nodeData.parentId) {
      const parentLabel = document.createElement("div");
      parentLabel.className = "label";
      parentLabel.textContent = "Parent Engine Node";
      infoPanel.appendChild(parentLabel);

      const parentValue = document.createElement("div");
      parentValue.className = "value";
      const parentNode = nodeMap.get(nodeData.parentId);
      parentValue.textContent = parentNode ? `${parentNode.label} (${parentNode.id})` : nodeData.parentId;
      infoPanel.appendChild(parentValue);

      // FRACTAL METRICS
const fractalHeader = document.createElement("div");
fractalHeader.className = "label";
fractalHeader.textContent = "Fractal Metrics";
infoPanel.appendChild(fractalHeader);

function addMetric(label, value) {
  const row = document.createElement("div");
  row.className = "metric";
  row.innerHTML = `<span>${label}</span><span class="value">${
    value === null ? "—" : value.toFixed(4)
  }</span>`;
  infoPanel.appendChild(row);
}

addMetric("Fractal Dimension (Dᶠ)", nodeData.fractal.fractalDimension);
addMetric("Self-Similarity Index (SSI)", nodeData.fractal.selfSimilarityIndex);
addMetric("Boundary Roughness (Bᵣ)", nodeData.fractal.boundaryRoughness);
addMetric("Fractal Instability Index (FII)", nodeData.fractal.fractalInstabilityIndex);
    }

    function fractalColor(fii) {
  if (fii === null) return "#6b7280"; // neutral gray
  if (fii < 0.5) return "#22c55e";    // stable → green
  if (fii < 1.0) return "#facc15";    // semi-stable → yellow
  return "#ef4444";                   // unstable → red
}

node.select("circle").attr("fill", d => fractalColor(d.fractal.fractalInstabilityIndex));

    node.append("circle")
  .attr("class", "fractal-halo")
  .attr("r", d => d.fractal.fractalInstabilityIndex ? 20 : 0)
  .attr("stroke", "#38bdf8")
  .attr("stroke-width", 0.8)
  .attr("fill", "none")
  .attr("opacity", d => Math.min(0.4, d.fractal.fractalInstabilityIndex || 0));
    
    // Local metrics: degree, in/out
    const inLinks = links.filter(l => l.target.id === nodeData.id);
    const outLinks = links.filter(l => l.source.id === nodeData.id);

    const metricsTitle = document.createElement("div");
    metricsTitle.className = "label";
    metricsTitle.textContent = "Local Graph Metrics";
    infoPanel.appendChild(metricsTitle);

    const m1 = document.createElement("div");
    m1.className = "metric";
    m1.innerHTML = `<span>In‑Degree</span><span class="value">${inLinks.length}</span>`;
    infoPanel.appendChild(m1);

    const m2 = document.createElement("div");
    m2.className = "metric";
    m2.innerHTML = `<span>Out‑Degree</span><span class="value">${outLinks.length}</span>`;
    infoPanel.appendChild(m2);

    const m3 = document.createElement("div");
    m3.className = "metric";
    m3.innerHTML = `<span>Total Degree</span><span class="value">${inLinks.length + outLinks.length}</span>`;
    infoPanel.appendChild(m3);

    const hint = document.createElement("div");
    hint.className = "hint";
    hint.textContent = "Drag nodes to re‑arrange. Dashed edges show pipeline flow between main engine nodes; solid edges show containment of sub‑components.";
    infoPanel.appendChild(hint);
  }

  node.on("mouseover", (event, d) => setInfo(d));
  node.on("click", (event, d) => setInfo(d));

  // Initial info: show first main node
  const firstMain = nodes.find(n => n.type === "main") || nodes[0];
  if (firstMain) setInfo(firstMain);

  // Resize handling
  window.addEventListener("resize", () => {
    const w = window.innerWidth;
    const h = window.innerHeight - 40;
    svg.attr("viewBox", [0, 0, w, h]);
    simulation.force("center", d3.forceCenter(w / 2, h / 2));
    simulation.alpha(0.5).restart();
  });
</script>
</body>
</html>
